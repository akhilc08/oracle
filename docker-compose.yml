version: "3.9"

services:
  neo4j:
    image: neo4j:5.19-community
    container_name: oracle-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/oracle_dev_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "512m"
      NEO4J_dbms_memory_heap_max__size: "1g"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "oracle_dev_password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: oracle-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

  oracle-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: oracle-api
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=oracle_dev_password
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./src:/app/src
      - ./data:/app/data

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
